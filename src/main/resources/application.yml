spring:
  datasource:
    url: jdbc:h2:mem:carrental-db
    driver-class-name: org.h2.Driver
    username: admin
    password: ""

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    show-sql: true

  sql:
    init:
      mode: always

carrental:
  pricing:
    SUV: 120.00
    SEDAN: 90.00
    VAN: 140.00

